                &lt;div class=&quot;face-card&quot; id=&quot;face-6&quot; data-id=&quot;6&quot; data-w=&quot;14&quot; data-h=&quot;7&quot; style=&quot;width: 112px; height: 56px; background-color: #c5e0b4; position: absolute; top: -2px; left: -2px;&quot;&gt;

                    &lt;div class=&quot;dimension-label&quot; style=&quot;right: -15px; top: 50%; transform: translateY(-50%) rotate(90deg);&quot;&gt;7cm&lt;/div&gt;

    &lt;div id=&quot;success-toast&quot; class=&quot;success-toast&quot;&gt;匹配成功！&lt;/div&gt;
    &lt;div id=&quot;error-toast&quot; class=&quot;error-toast&quot;&gt;尺寸不匹配，请再试一次&lt;/div&gt;
    &lt;div id=&quot;dimension-overlay&quot; class=&quot;dimension-overlay&quot;&gt;&lt;/div&gt;

    &lt;script&gt;
        // --- Configuration ---
        const PRISM_L = 14; // Length
        const PRISM_W = 7;  // Width
        const PRISM_H = 9;  // Height
        const SCALE = 20;   // Scale for 3D rendering

        let matchedFaces = {
            front: { matched: false, id: null },
            back: { matched: false, id: null },
            left: { matched: false, id: null },
            right: { matched: false, id: null },
            top: { matched: false, id: null },
            bottom: { matched: false, id: null }
        };

        let progress = 0;

        // --- p5.js Sketch ---
        let rotationX = -0.3;
        let rotationY = 0.5;
        let canvas;
        let labelGfx;

        const sketch = (p) =&gt; {
            p.setup = () =&gt; {
                canvas = p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
                canvas.parent('canvas-container');
                p.smooth();
                labelGfx = p.createGraphics(256, 64);
            };

            p.draw = () =&gt; {
                p.background(240, 249, 255);
                
                // Lighting
                p.ambientLight(180);
                p.directionalLight(255, 255, 255, 0.5, 0.5, -1);

                // Interaction: Rotate with mouse if not dragging
                if (!isDragging &amp;&amp; p.mouseIsPressed) {
                    rotationY += (p.mouseX - p.pmouseX) * 0.01;
                    rotationX -= (p.mouseY - p.pmouseY) * 0.01;
                }

                p.push();
                p.rotateX(rotationX);
                p.rotateY(rotationY);

                // Draw Prism Frame
                p.noFill();
                p.stroke(46, 91, 186);
                p.strokeWeight(3);
                p.box(PRISM_L * SCALE, PRISM_H * SCALE, PRISM_W * SCALE);

                // Draw Matched Faces
                drawMatchedFaces(p);

                // Draw Dimension Labels on Frame
                drawFrameLabels(p);
                p.pop();
            };

            function drawMatchedFaces(p) {
                p.noStroke();
                const l = PRISM_L * SCALE;
                const h = PRISM_H * SCALE;
                const w = PRISM_W * SCALE;

                const faces = [
                    { key: 'front', t: [0, 0, w/2], r: [0, 0, 0], c: [255, 229, 153, 200], sz: [l, h], name: &quot;前面&quot; },
                    { key: 'back', t: [0, 0, -w/2], r: [0, p.PI, 0], c: [255, 229, 153, 200], sz: [l, h], name: &quot;后面&quot; },
                    { key: 'top', t: [0, -h/2, 0], r: [p.HALF_PI, 0, 0], c: [197, 224, 180, 200], sz: [l, w], name: &quot;上面&quot; },
                    { key: 'bottom', t: [0, h/2, 0], r: [-p.HALF_PI, 0, 0], c: [197, 224, 180, 200], sz: [l, w], name: &quot;下面&quot; },
                    { key: 'left', t: [-l/2, 0, 0], r: [0, -p.HALF_PI, 0], c: [180, 199, 231, 200], sz: [w, h], name: &quot;左面&quot; },
                    { key: 'right', t: [l/2, 0, 0], r: [0, p.HALF_PI, 0], c: [180, 199, 231, 200], sz: [w, h], name: &quot;右面&quot; }
                ];

                faces.forEach(f =&gt; {
                    if (matchedFaces[f.key].matched) {
                        p.push();
                        p.translate(...f.t);
                        p.rotateX(f.r[0]);
                        p.rotateY(f.r[1]);
                        p.rotateZ(f.r[2]);
                        p.fill(...f.c);
                        p.rectMode(p.CENTER);
                        p.rect(0, 0, f.sz[0], f.sz[1]);
                        
                        // Draw face label (name and circled number)
                        const id = matchedFaces[f.key].id;
                        const circledNumbers = [&quot;&quot;, &quot;①&quot;, &quot;②&quot;, &quot;③&quot;, &quot;④&quot;, &quot;⑤&quot;, &quot;⑥&quot;];
                        drawBillboardText(p, f.name, 0, -15, 2, 24, [0, 0, 0]);
                        drawBillboardText(p, circledNumbers[id] || id, 0, 15, 2, 32, [255, 0, 0]);
                        p.pop();
                    }
                });
            }

            function drawBillboardText(p, txt, x, y, z, size, col) {
                labelGfx.clear();
                labelGfx.textAlign(p.CENTER, p.CENTER);
                labelGfx.textSize(size);
                labelGfx.textStyle(p.BOLD);
                labelGfx.fill(col[0], col[1], col[2]);
                labelGfx.text(txt, 128, 32);

                p.push();
                p.translate(x, y, z);
                // Billboard: rotate back to face camera
                p.rotateY(-rotationY);
                p.rotateX(-rotationX);
                p.texture(labelGfx);
                p.noStroke();
                p.plane(120, 30);
                p.pop();
            }

            function drawFrameLabels(p) {
                const l = PRISM_L * SCALE;
                const h = PRISM_H * SCALE;
                const w = PRISM_W * SCALE;

                // Length: 14厘米 (Bottom-front edge)
                drawBillboardText(p, &quot;长 14厘米&quot;, 0, h/2 + 15, w/2, 24, [255, 0, 0]);
                // Height: 9厘米 (Right-front vertical edge)
                drawBillboardText(p, &quot;高 9厘米&quot;, l/2 + 20, 0, w/2, 24, [255, 0, 0]);
                // Width: 7厘米 (Right-bottom depth edge)
                drawBillboardText(p, &quot;宽 7厘米&quot;, l/2 + 20, h/2 + 15, 0, 24, [255, 0, 0]);
            }

            p.windowResized = () =&gt; {
                p.resizeCanvas(p.windowWidth, p.windowHeight);
            };
        };

        new p5(sketch);

        // --- Drag and Drop Logic ---
        let isDragging = false;
        let activeElement = null;
        let startX, startY, initialLeft, initialTop;

        const pool = document.getElementById('pool');
        const faceCards = document.querySelectorAll('.face-card');
        const dimensionOverlay = document.getElementById('dimension-overlay');

        faceCards.forEach(card =&gt; {
            card.addEventListener('mousedown', startDrag);
            card.addEventListener('touchstart', startDrag, { passive: false });
        });

        function startDrag(e) {
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
            }

            isDragging = true;
            
            // Clone the element for dragging
            const original = e.currentTarget;
            activeElement = original.cloneNode(true);
            activeElement.id = original.id + &quot;_dragging&quot;;
            activeElement.dataset.id = original.dataset.id;
            activeElement.dataset.w = original.dataset.w;
            activeElement.dataset.h = original.dataset.h;
            
            document.body.appendChild(activeElement);
            
            const rect = original.getBoundingClientRect();
            initialLeft = rect.left;
            initialTop = rect.top;

            activeElement.style.position = 'fixed';
            activeElement.style.left = initialLeft + 'px';
            activeElement.style.top = initialTop + 'px';
            activeElement.style.margin = '0';
            activeElement.style.zIndex = '1000';
            activeElement.style.pointerEvents = 'none';

            // Show dimension overlay
            const w = activeElement.dataset.w;
            const h = activeElement.dataset.h;
            dimensionOverlay.innerText = `${w}cm &times; ${h}cm`;
            dimensionOverlay.style.display = 'block';

            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag, { passive: false });
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchend', stopDrag);
        }

        function drag(e) {
            if (!isDragging) return;
            if (e.type === 'touchmove') e.preventDefault();

            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

            const dx = clientX - startX;
            const dy = clientY - startY;

            activeElement.style.left = (initialLeft + dx) + 'px';
            activeElement.style.top = (initialTop + dy) + 'px';

            // Update dimension overlay position
            dimensionOverlay.style.left = (clientX + 20) + 'px';
            dimensionOverlay.style.top = (clientY - 20) + 'px';
        }

        function stopDrag(e) {
            if (!isDragging) return;
            isDragging = false;

            const clientX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY;

            checkMatch(clientX, clientY);

            document.removeEventListener('mousemove', drag);
            document.removeEventListener('touchmove', drag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchend', stopDrag);
            
            dimensionOverlay.style.display = 'none';
        }

        function checkMatch(x, y) {
            const w = parseInt(activeElement.dataset.w);
            const h = parseInt(activeElement.dataset.h);
            const id = activeElement.dataset.id;
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const dist = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));

            let matched = false;
            let faceKey = &quot;&quot;;

            // Logic: Check if dimensions match any of the prism's faces
            // Front/Back: 14x9
            if ((w === 14 &amp;&amp; h === 9) || (w === 9 &amp;&amp; h === 14)) {
                if (!matchedFaces.front.matched) {
                    faceKey = &quot;front&quot;;
                    matched = true;
                } else if (!matchedFaces.back.matched) {
                    faceKey = &quot;back&quot;;
                    matched = true;
                } else {
                    showToast('error', '该尺寸的面已全部找齐');
                    activeElement.remove();
                    activeElement = null;
                    return;
                }
            }
            // Top/Bottom: 14x7
            else if ((w === 14 &amp;&amp; h === 7) || (w === 7 &amp;&amp; h === 14)) {
                if (!matchedFaces.top.matched) {
                    faceKey = &quot;top&quot;;
                    matched = true;
                } else if (!matchedFaces.bottom.matched) {
                    faceKey = &quot;bottom&quot;;
                    matched = true;
                } else {
                    showToast('error', '该尺寸的面已全部找齐');
                    activeElement.remove();
                    activeElement = null;
                    return;
                }
            }
            // Left/Right: 9x7
            else if ((w === 9 &amp;&amp; h === 7) || (w === 7 &amp;&amp; h === 9)) {
                if (!matchedFaces.left.matched) {
                    faceKey = &quot;left&quot;;
                    matched = true;
                } else if (!matchedFaces.right.matched) {
                    faceKey = &quot;right&quot;;
                    matched = true;
                } else {
                    showToast('error', '该尺寸的面已全部找齐');
                    activeElement.remove();
                    activeElement = null;
                    return;
                }
            }

            if (matched &amp;&amp; dist &lt; 300) {
                matchedFaces[faceKey].matched = true;
                matchedFaces[faceKey].id = id;
                progress++;
                document.getElementById('progress-text').innerText = `${progress} / 6`;
                showToast('success', '匹配成功！这是长方体的' + getFaceName(faceKey));
                
                activeElement.remove();
                activeElement = null;
                
                if (progress === 6) {
                    setTimeout(() =&gt; {
                        alert(&quot;🎉 恭喜完成！\n你已经成功找齐了长方体的6个面。\n观察发现：相对的面（如前面和后面）尺寸是完全一样的！&quot;);
                    }, 500);
                }
            } else {
                showToast('error', '尺寸不匹配或位置不对');
                // Animate back and remove
                anime({
                    targets: activeElement,
                    left: initialLeft,
                    top: initialTop,
                    duration: 500,
                    easing: 'easeOutElastic(1, .8)',
                    complete: () =&gt; {
                        activeElement.remove();
                        activeElement = null;
                    }
                });
            }
        }

        function getFaceName(key) {
            const names = {
                front: &quot;前面&quot;, back: &quot;后面&quot;,
                left: &quot;左面&quot;, right: &quot;右面&quot;,
                top: &quot;上面&quot;, bottom: &quot;下面&quot;
            };
            return names[key];
        }

        function showToast(type, message) {
            const toast = document.getElementById(type + '-toast');
            toast.innerText = message || (type === 'success' ? '匹配成功！' : '尺寸不匹配');
            toast.style.display = 'block';
            anime({
                targets: toast,
                opacity: [0, 1],
                translateY: [-20, 0],
                duration: 300,
                easing: 'easeOutQuad'
            });

            setTimeout(() =&gt; {
                anime({
                    targets: toast,
                    opacity: 0,
                    translateY: -20,
                    duration: 300,
                    easing: 'easeInQuad',
                    complete: () =&gt; {
                        toast.style.display = 'none';
                    }
                });
            }, 2000);
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**

     */

      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}

        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
